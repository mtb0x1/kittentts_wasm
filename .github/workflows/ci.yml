name: Build & Deploy

on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        targets: wasm32-unknown-unknown
      
    - name: Install rust-just
      run: npm install -g rust-just

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install wasm-opt
      run: npm install -g wasm-opt

    - name: Build WASM
      run: just build-release

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: wasm-build
        path: web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Configure git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: Initialize gh-pages branch
      run: |
        if ! git rev-parse --verify gh-pages 2>/dev/null; then
          git checkout --orphan gh-pages
          git rm -rf .
          git commit --allow-empty -m "Initial gh-pages branch"
          git checkout master
        fi
        git checkout gh-pages
        
    - uses: actions/download-artifact@v7
      with:
        name: wasm-build
        path: .
        
    - name: Commit & Push
      run: |
        # Artifact from web/ uploads contents directly to root
        touch .nojekyll
        git add -A
        git add .nojekyll
        git diff --staged --quiet || git commit -m "Deploy $(date -u +%Y-%m-%dT%H%M%SZ)"
        git push --set-upstream origin gh-pages -f
    
 
